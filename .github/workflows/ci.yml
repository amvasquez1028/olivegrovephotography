# Public snapshot: lint + static export build only (no lambda/ or Playwright in this tree).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Production-style build
        env:
          ENFORCE_PROD_AUTH: "true"
        run: npm run build
